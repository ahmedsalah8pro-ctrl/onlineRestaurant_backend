<section class="page-shell">
  <div class="glass-panel integrations-card" style="width: 100%;">
    <span class="eyebrow">📋 {{ ui.t('admin.integrations.logs') }}</span>
    <h2 class="section-title">سجلات النظام / Audit Logs</h2>
    
    <p-table [value]="auditLogs()" [paginator]="true" [rows]="15" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th>الإجراء / Action</th>
          <th>المستخدم / User</th>
          <th>التاريخ / Date</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-log>
        <tr>
          <td>
            <p-tag [value]="log['action'] || log['event']" severity="info"></p-tag>
          </td>
          <td><strong>{{ log['user_name'] || log['causer_id'] || 'System' }}</strong></td>
          <td>{{ log['created_at'] | date: 'medium' }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="empty-row" style="text-align: center; padding: 2rem;">لا توجد سجلات حالياً / No logs found</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>
